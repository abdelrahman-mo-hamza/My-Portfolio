<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>عبدالرحمن محمد حمزة - السيرة الذاتية</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="stylesheet" href="css/all.min.css" />
  <meta name="theme-color" content="#2196f3" />
  <script>
    (() => {
      try {
        const savedTheme = localStorage.getItem("theme");
        const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        const theme = savedTheme === "dark" || savedTheme === "light" ? savedTheme : (prefersDark ? "dark" : "light");
        document.documentElement.dataset.theme = theme;
      } catch (error) {
        document.documentElement.dataset.theme = "light";
      }
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --accent: #2196f3;
      --accent-dark: #1787e0;
      --ink: #102033;
      --muted: #637083;
      --line: #dbeafe;
      --soft: #f5faff;
      --panel: #ffffff;
      --shadow: 0 18px 40px rgb(15 23 42 / 10%);
    }

    html {
      color-scheme: light;
    }

    html[data-theme="dark"] {
      color-scheme: dark;
      --accent: #4db5ff;
      --accent-dark: #77c8ff;
      --ink: #e5edf7;
      --muted: #a8b3c7;
      --line: #243247;
      --soft: #0b1120;
      --panel: #111827;
      --shadow: 0 22px 46px rgb(0 0 0 / 34%);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Cairo", Arial, sans-serif;
      color: var(--ink);
      background: #edf5ff;
      line-height: 1.65;
      overflow-x: hidden;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .cv-toolbar {
      width: min(1080px, calc(100% - 32px));
      margin: 18px auto 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      direction: inherit;
    }

    .cv-toolbar__title {
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .cv-toolbar__actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .cv-toolbar a,
    .cv-toolbar button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 40px;
      padding: 0 14px;
      border: 1px solid #d7e7f8;
      border-radius: 999px;
      background: white;
      color: var(--accent-dark);
      font: inherit;
      font-size: 13px;
      font-weight: 900;
      cursor: pointer;
    }

    .cv-toolbar a:hover,
    .cv-toolbar button:hover {
      border-color: var(--accent);
      background: #f8fbff;
    }

    .cv-toolbar [data-theme-toggle] {
      width: 62px;
      min-width: 62px;
      padding: 3px;
      border-radius: 999px;
    }

    .theme-switch__track {
      position: relative;
      display: block;
      width: 100%;
      height: 28px;
      border-radius: inherit;
    }

    .theme-switch__thumb {
      position: absolute;
      left: 0;
      top: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: white;
      color: var(--accent-dark);
      box-shadow: 0 4px 12px rgb(15 23 42 / 18%);
      transition: transform 0.3s, background-color 0.3s, color 0.3s;
    }

    .cv {
      width: min(1080px, calc(100% - 32px));
      margin: 24px auto;
      background: var(--panel);
      border-radius: 18px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .hero {
      position: relative;
      display: grid;
      grid-template-columns: 1fr 0.42fr;
      gap: 28px;
      padding: 34px 38px;
      background:
        linear-gradient(135deg, rgb(33 150 243 / 11%), rgb(255 255 255 / 92%)),
        radial-gradient(circle at top left, rgb(33 150 243 / 18%), transparent 34%);
      border-bottom: 1px solid var(--line);
    }

    .hero::before {
      content: "";
      position: absolute;
      inset-inline-start: 0;
      top: 0;
      width: 7px;
      height: 100%;
      background: linear-gradient(180deg, var(--accent), var(--accent-dark));
    }

    .name {
      margin: 0;
      font-size: 34px;
      line-height: 1.15;
      font-weight: 900;
      letter-spacing: 0;
      overflow-wrap: anywhere;
    }

    .role {
      margin: 10px 0 16px;
      color: var(--accent-dark);
      font-size: 18px;
      font-weight: 800;
    }

    .summary {
      margin: 0;
      max-width: 760px;
      color: #415066;
      font-size: 15px;
    }

    .contact-card {
      align-self: stretch;
      padding: 18px;
      background: white;
      border: 1px solid var(--line);
      border-radius: 14px;
      box-shadow: 0 10px 24px rgb(33 150 243 / 8%);
    }

    .contact-card h2,
    .section h2 {
      margin: 0 0 12px;
      color: var(--ink);
      font-size: 17px;
      font-weight: 900;
    }

    .contact-list {
      display: grid;
      gap: 7px;
      margin: 0;
      padding: 0;
      list-style: none;
      color: var(--muted);
      font-size: 12.8px;
      line-height: 1.45;
      direction: ltr;
      text-align: left;
    }

    .contact-list .rtl {
      direction: rtl;
      text-align: right;
    }

    html[dir="rtl"] .contact-list {
      direction: ltr;
      text-align: left;
    }

    .metric-row {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
      padding: 20px 38px;
      background: #fbfdff;
      border-bottom: 1px solid var(--line);
    }

    .metric {
      padding: 14px;
      border: 1px solid #e2efff;
      border-radius: 12px;
      background: white;
    }

    .metric strong {
      display: block;
      color: var(--accent-dark);
      font-size: 24px;
      line-height: 1;
      font-weight: 900;
      direction: ltr;
      text-align: right;
    }

    .metric span {
      display: block;
      margin-top: 7px;
      color: var(--muted);
      font-size: 12.5px;
      line-height: 1.45;
    }

    .content {
      display: grid;
      grid-template-columns: 0.74fr 1.26fr;
      gap: 0;
    }

    .side,
    .main {
      padding: 28px 34px 34px;
    }

    .side {
      background: var(--soft);
      border-left: 1px solid var(--line);
    }

    .section + .section {
      margin-top: 24px;
    }

    .section h2 {
      position: relative;
      padding-bottom: 9px;
      border-bottom: 2px solid #e2efff;
    }

    .section h2::after {
      content: "";
      position: absolute;
      inset-inline-start: 0;
      bottom: -2px;
      width: 64px;
      height: 2px;
      background: var(--accent);
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      padding: 7px 10px;
      border-radius: 999px;
      background: white;
      border: 1px solid #dcecff;
      color: #24364d;
      font-size: 12px;
      font-weight: 800;
      line-height: 1.35;
    }

    .list {
      margin: 0;
      padding: 0;
      list-style: none;
      color: var(--muted);
      font-size: 13px;
    }

    .list li {
      position: relative;
      padding-inline-start: 16px;
    }

    .list li + li {
      margin-top: 7px;
    }

    .list li::before {
      content: "";
      position: absolute;
      inset-inline-start: 0;
      top: 0.78em;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
    }

    .job {
      break-inside: avoid;
      padding-bottom: 18px;
      border-bottom: 1px solid #e6eef8;
    }

    .job + .job {
      margin-top: 18px;
    }

    .job:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }

    .job-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 6px;
    }

    .job h3 {
      margin: 0;
      font-size: 16px;
      font-weight: 900;
      line-height: 1.35;
    }

    .date {
      flex: 0 0 auto;
      padding: 5px 10px;
      border-radius: 999px;
      background: #e9f5ff;
      color: var(--accent-dark);
      font-size: 11.5px;
      font-weight: 900;
      white-space: nowrap;
    }

    .company {
      margin: 0 0 10px;
      color: var(--muted);
      font-size: 12.8px;
      font-weight: 700;
    }

    .job .list {
      font-size: 12.7px;
      line-height: 1.62;
    }

    .project {
      break-inside: avoid;
      padding: 14px;
      border: 1px solid #e2efff;
      border-radius: 12px;
      background: #fbfdff;
    }

    .project + .project {
      margin-top: 12px;
    }

    .project h3 {
      margin: 0 0 8px;
      color: var(--accent-dark);
      font-size: 14.5px;
      font-weight: 900;
    }

    .section-head p {
      margin: -4px 0 16px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      line-height: 1.6;
    }

    .certificate-gallery-section {
      margin-top: 24px;
    }

    .certificate-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .certificate-card {
      padding: 8px;
      border: 1px solid #e2efff;
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 8px 18px rgb(15 23 42 / 7%);
      cursor: zoom-in;
      transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .certificate-card:hover,
    .certificate-card:focus-visible {
      border-color: var(--accent);
      box-shadow: 0 14px 26px rgb(33 150 243 / 14%);
      transform: translateY(-2px);
      outline: none;
    }

    .certificate-card img {
      display: block;
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: contain;
      background: #f8fbff;
    }

    .certificate-preview {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 0.2s ease, visibility 0.2s ease;
    }

    .certificate-preview.active {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }

    .certificate-preview__backdrop {
      position: absolute;
      inset: 0;
      background: rgb(15 23 42 / 72%);
    }

    .certificate-preview__frame {
      position: relative;
      z-index: 2;
      width: fit-content;
      max-width: min(94vw, 980px);
      max-height: calc(100vh - 52px);
      margin: 0;
      padding: 14px;
      border-radius: 12px;
      background: #fff;
      box-shadow: 0 28px 70px rgb(15 23 42 / 35%);
    }

    .certificate-preview__frame img {
      display: block;
      max-width: 100%;
      max-height: calc(100vh - 108px);
      object-fit: contain;
    }

    .certificate-preview__frame figcaption {
      padding-top: 10px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 900;
      text-align: center;
    }

    .certificate-preview__close,
    .certificate-preview__nav {
      position: absolute;
      z-index: 3;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      border: 1px solid rgb(255 255 255 / 36%);
      border-radius: 50%;
      background: rgb(255 255 255 / 94%);
      color: var(--accent-dark);
      cursor: pointer;
      transition: transform 0.2s ease, background 0.2s ease;
    }

    .certificate-preview__close:hover,
    .certificate-preview__nav:hover,
    .certificate-preview__close:focus-visible,
    .certificate-preview__nav:focus-visible {
      background: #fff;
      transform: scale(1.06);
      outline: none;
    }

    .certificate-preview__close {
      top: 18px;
      inset-inline-end: 18px;
    }

    .certificate-preview__nav {
      top: 50%;
      transform: translateY(-50%);
    }

    .certificate-preview__nav:hover,
    .certificate-preview__nav:focus-visible {
      transform: translateY(-50%) scale(1.06);
    }

    .certificate-preview__nav--prev {
      inset-inline-start: 18px;
    }

    .certificate-preview__nav--next {
      inset-inline-end: 18px;
    }

    body.cv-certificate-preview-active {
      overflow: hidden;
    }

    .footer {
      padding: 16px 38px 24px;
      color: #718096;
      background: #fbfdff;
      border-top: 1px solid var(--line);
      font-size: 12px;
      text-align: center;
    }

    html[data-theme="dark"] body {
      background: #0b1120;
    }

    html[data-theme="dark"] .cv-toolbar a,
    html[data-theme="dark"] .cv-toolbar button,
    html[data-theme="dark"] .contact-card,
    html[data-theme="dark"] .metric,
    html[data-theme="dark"] .chip,
    html[data-theme="dark"] .project {
      background: #162033;
      border-color: #2c3d56;
      color: #dbeafe;
    }

    html[data-theme="dark"] .cv-toolbar a:hover,
    html[data-theme="dark"] .cv-toolbar button:hover {
      border-color: var(--accent);
      background: #1e2b43;
    }

    html[data-theme="dark"] .theme-switch__thumb {
      transform: translateX(28px);
      background: #0f172a;
      color: #facc15;
    }

    html[data-theme="dark"] .hero {
      background:
        linear-gradient(135deg, rgb(77 181 255 / 13%), rgb(17 24 39 / 94%)),
        radial-gradient(circle at top left, rgb(77 181 255 / 17%), transparent 34%);
    }

    html[data-theme="dark"] .summary,
    html[data-theme="dark"] .contact-list,
    html[data-theme="dark"] .metric span,
    html[data-theme="dark"] .list,
    html[data-theme="dark"] .company,
    html[data-theme="dark"] .footer {
      color: #a8b3c7;
    }

    html[data-theme="dark"] .metric-row,
    html[data-theme="dark"] .footer {
      background: #0f172a;
    }

    html[data-theme="dark"] .section h2 {
      border-color: #2c3d56;
    }

    html[data-theme="dark"] .job {
      border-color: #243247;
    }

    html[data-theme="dark"] .date {
      background: #19314f;
      color: var(--accent-dark);
    }

    html[data-theme="dark"] .certificate-card,
    html[data-theme="dark"] .certificate-preview__frame {
      background: #162033;
      border-color: #2c3d56;
    }

    html[data-theme="dark"] .certificate-card img {
      background: #0f172a;
    }

    html[data-theme="dark"] .certificate-preview__close,
    html[data-theme="dark"] .certificate-preview__nav {
      background: #162033;
      color: #dbeafe;
    }

    @media print {
      html[data-theme="dark"] {
        color-scheme: light;
        --accent: #2196f3;
        --accent-dark: #1787e0;
        --ink: #102033;
        --muted: #637083;
        --line: #dbeafe;
        --soft: #f5faff;
        --panel: #ffffff;
        --shadow: none;
      }
    }

    @page {
      size: A4;
      margin: 10mm;
    }

    @media print {
      body {
        background: white;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      .cv {
        width: 100%;
        margin: 0;
        border-radius: 0;
        box-shadow: none;
      }

      .cv-toolbar {
        display: none;
      }

      .certificate-gallery-section,
      .certificate-preview {
        display: none !important;
      }

      .hero {
        padding: 24px 26px;
      }

      .metric-row {
        padding: 16px 26px;
      }

      .side,
      .main {
        padding: 22px 26px 26px;
      }

      .footer {
        padding: 12px 26px 0;
      }
    }

    @media (max-width: 760px) {
      html,
      body {
        width: 100%;
        max-width: 100%;
        overflow-x: hidden;
      }

      #cvRoot {
        width: 100%;
        max-width: 100vw;
        overflow: hidden;
        direction: ltr;
      }

      html[dir="rtl"] .cv,
      html[dir="rtl"] .cv-toolbar {
        direction: rtl;
      }

      html[dir="ltr"] .cv,
      html[dir="ltr"] .cv-toolbar {
        direction: ltr;
      }

      .cv {
        width: 100vw;
        max-width: 100vw;
        margin: 0;
        border-radius: 0;
        overflow: hidden;
      }

      .cv-toolbar {
        width: 100vw;
        max-width: 100vw;
        margin: 0;
        padding: 12px;
        align-items: flex-start;
        flex-direction: column;
        background: white;
      }

      .cv-toolbar__title,
      .cv-toolbar__actions {
        width: 100%;
        max-width: 100%;
        overflow-wrap: anywhere;
      }

      .cv-toolbar__actions {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .cv-toolbar a,
      .cv-toolbar button {
        width: 100%;
        min-width: 0;
        padding: 0 10px;
        text-align: center;
      }

      html[data-theme="dark"] .cv-toolbar {
        background: #0f172a;
      }

      .hero,
      .content {
        grid-template-columns: 1fr;
      }

      .hero > div {
        text-align: center;
      }

      .summary {
        margin-left: auto;
        margin-right: auto;
      }

      .metric-row {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        padding: 18px;
      }

      .hero,
      .side,
      .main {
        padding-left: 28px;
        padding-right: 28px;
        min-width: 0;
      }

      .name {
        font-size: 24px;
        line-height: 1.25;
      }

      .role,
      .summary,
      .contact-card,
      .contact-list li,
      .section h2,
      .job h3,
      .project h3 {
        max-width: 100%;
        overflow-wrap: anywhere;
        word-break: break-word;
      }

      .job-head {
        flex-direction: column;
        gap: 8px;
      }

      .date {
        width: fit-content;
        max-width: 100%;
        white-space: normal;
      }

      .side {
        border-left: none;
        border-top: 1px solid var(--line);
      }

      .certificate-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .certificate-preview {
        padding: 14px;
      }

      .certificate-preview__close {
        top: 12px;
        inset-inline-end: 12px;
      }

      .certificate-preview__nav {
        top: auto;
        bottom: 16px;
        transform: none;
      }

      .certificate-preview__nav:hover,
      .certificate-preview__nav:focus-visible {
        transform: scale(1.06);
      }

      .certificate-preview__nav--prev {
        inset-inline-start: calc(50% - 58px);
      }

      .certificate-preview__nav--next {
        inset-inline-end: calc(50% - 58px);
      }
    }
  </style>
</head>

    function detectBrowserLanguage() {
      const language = navigator.language || navigator.userLanguage || "en";
      return language.startsWith("ar") ? "ar" : "en";
    }

    function getInitialLanguage() {
      const urlLanguage = new URLSearchParams(window.location.search).get("lang");
      if (supportedLanguages.includes(urlLanguage)) {
        return urlLanguage;
      }

      const storedLanguage = localStorage.getItem("language");
      if (supportedLanguages.includes(storedLanguage)) {
        return storedLanguage;
      }

      return detectBrowserLanguage();
    }

    function getInitialTheme() {
      const storedTheme = localStorage.getItem(themeStorageKey);
      if (supportedThemes.includes(storedTheme)) {
        return storedTheme;
      }

      return window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
    }

    function updateThemeMeta() {
      const themeMeta = document.querySelector('meta[name="theme-color"]');
      if (!themeMeta) {
        return;
      }

      themeMeta.setAttribute("content", currentTheme === "dark" ? "#0f172a" : "#2196f3");
    }

    function applyTheme(theme, shouldPersist = true) {
      currentTheme = supportedThemes.includes(theme) ? theme : "light";
      document.documentElement.dataset.theme = currentTheme;

      if (shouldPersist) {
        localStorage.setItem(themeStorageKey, currentTheme);
      }

      updateThemeMeta();
      updateThemeButton();
    }

    function updateThemeButton() {
      const themeButton = root.querySelector("[data-theme-toggle]");
      if (!themeButton) {
        return;
      }

      const content = CV_CONTENT[document.documentElement.lang] || CV_CONTENT.en;
      const label = currentTheme === "dark" ? content.themeToLight : content.themeToDark;
      const icon = themeButton.querySelector("i");
      themeButton.setAttribute("aria-label", label);
      themeButton.setAttribute("title", label);
      themeButton.setAttribute("aria-pressed", String(currentTheme === "dark"));

      if (icon) {
        icon.className = currentTheme === "dark" ? "fas fa-sun" : "fas fa-moon";
      }
    }

    function toggleTheme() {
      applyTheme(currentTheme === "dark" ? "light" : "dark");
    }

    function escapeHtml(value) {

        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")

        .replace(/'/g, "&#039;");

    function bindCertificatePreview(language) {
      const copy = getCertificateCopy(language);
      const preview = root.querySelector("[data-certificate-preview]");
      const previewImage = root.querySelector("[data-certificate-preview-image]");
      const previewCounter = root.querySelector("[data-certificate-counter]");
      const closeButton = root.querySelector("[data-certificate-close-button]");
      const prevButton = root.querySelector("[data-certificate-prev]");
      const nextButton = root.querySelector("[data-certificate-next]");
      const backdrop = root.querySelector("[data-certificate-close]");
      const cards = [...root.querySelectorAll("[data-certificate-index]")];
      let currentIndex = 0;
      let activeTrigger = null;

      if (!preview || !previewImage || !previewCounter || !closeButton || !prevButton || !nextButton || !backdrop || !cards.length) {
        return;
      }

      const updatePreview = () => {
        const certificate = CERTIFICATE_IMAGES[currentIndex];
        previewImage.src = certificate.src;
        previewImage.alt = `${copy.open} ${currentIndex + 1}`;
        previewCounter.textContent = `${currentIndex + 1} / ${CERTIFICATE_IMAGES.length}`;
      };

      const openPreview = (index, trigger) => {
        currentIndex = index;
        activeTrigger = trigger;
        updatePreview();
        preview.classList.add("active");
        preview.setAttribute("aria-hidden", "false");
        document.body.classList.add("cv-certificate-preview-active");
        closeButton.focus();
      };

      const closePreview = () => {
        preview.classList.remove("active");
        preview.setAttribute("aria-hidden", "true");
        document.body.classList.remove("cv-certificate-preview-active");
        previewImage.removeAttribute("src");

        if (activeTrigger) {
          activeTrigger.focus();
        }
      };

      const movePreview = (step) => {
        currentIndex = (currentIndex + step + CERTIFICATE_IMAGES.length) % CERTIFICATE_IMAGES.length;
        updatePreview();
      };

      cards.forEach((card) => {
        card.addEventListener("click", () => {
          openPreview(Number(card.dataset.certificateIndex) || 0, card);
        });
      });

      closeButton.addEventListener("click", closePreview);
      backdrop.addEventListener("click", closePreview);
      prevButton.addEventListener("click", () => movePreview(-1));
      nextButton.addEventListener("click", () => movePreview(1));

      preview.addEventListener("keydown", (event) => {
        if (event.key === "Escape") {
          closePreview();
        } else if (event.key === "ArrowLeft") {
          movePreview(-1);
        } else if (event.key === "ArrowRight") {
          movePreview(1);
        }
      });
    }

              <section class="section">
                <h2>${escapeHtml(content.projectsTitle)}</h2>
                ${content.projects.map(renderProject).join("")}
              </section>
              ${renderCertificates(language)}
            </div>
          </section>
          <footer class="footer">${escapeHtml(content.footer)}</footer>
        </main>
        ${renderCertificatePreview(language)}
      `;

      applyTheme(currentTheme, false);
      root.querySelector("[data-print]")?.addEventListener("click", () => window.print());
      root.querySelector("[data-theme-toggle]")?.addEventListener("click", toggleTheme);
      root.querySelector("[data-language]")?.addEventListener("click", (event) => {
        applyLanguage(event.currentTarget.dataset.language);
      });
      bindCertificatePreview(language);

      if (window.location.hash === "#certificates") {
        requestAnimationFrame(() => {
          root.querySelector("#certificates")?.scrollIntoView({ block: "start" });
        });
      }
    }

    applyLanguage(getInitialLanguage());
    window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", (event) => {
      if (!localStorage.getItem(themeStorageKey)) {
        applyTheme(event.matches ? "dark" : "light", false);
      }
    });
  </script>
</body>

</html>
